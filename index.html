<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="player">
        <audio id="custom-audio"></audio>

        <h1 id="song-title">Title : None</h1>

        <label for="audio-upload" class="btn btn-load">LOAD TRACK</label>
        <input type="file" id="audio-upload" accept="audio/*" class="visually-hidden">

        <div class="progress-bg">
            <div id="progress-fill"></div>
        </div>
        <div class="time-text">
            <span id="current-time">0:00</span>
            <span id="total-time">0:00</span>
        </div>

        <div class="controls">
            <button id="btn-skip-back" class="btn">&lt;&lt;</button>
            <button id="btn-play" class="btn btn-play">PLAY</button>
            <button id="btn-skip-fwd" class="btn">&gt;&gt;</button>
        </div>

        <div class="settings">
            <button id="btn-loop" class="btn">LOOP</button>
            <button id="btn-mute" class="btn">MUTE</button>
            <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
